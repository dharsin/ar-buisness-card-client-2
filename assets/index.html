<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Premium Split AR Business Card</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    AFRAME.registerComponent('url-opener', {
      schema: { link: { type: 'string' } },
      init: function () {
        const targetUrl = this.data.link;
        this.el.addEventListener('click', function (evt) {
          evt.stopPropagation();
          const newWindow = window.open(targetUrl, '_blank');
          if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
            window.location.href = targetUrl;
          }
        });
      }
    });
  </script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./tracker1.mind; filterMinCF:0.001; filterBeta:0.01; uiLoading:yes; uiScanning:yes;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="bgVideo" 
             src="YOUR_VIDEO_URL_HERE.mp4" 
             loop="true" 
             crossorigin="anonymous" 
             playsinline 
             muted 
             autoplay>
      </video>

      <img id="profilePic" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&h=200&q=80">
      <img id="btnWeb" src="https://i.imgur.com/k6AUnXm.png"> 
      <img id="btnIn" src="https://i.imgur.com/83p8xX4.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
      raycaster="objects: .clickable; far: 10000; interval: 100;">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-circle src="#profilePic" position="0.45 0.35 0.01" radius="0.12" shader="flat"></a-circle>

      <a-text value="Matt\nWatson" align="left" width="2.5" color="#FFFFFF" position="0.65 0.35 0.01"></a-text>

      <a-video class="clickable" 
               url-opener="link: https://www.youtube.com/" 
               src="#bgVideo" 
               position="-0.35 -0.22 0.01" 
               width="0.55" 
               height="0.38">
      </a-video>

      <a-plane class="clickable" url-opener="link: https://www.youtube.com/" position="0.55 -0.05 0.02" width="0.48"
        height="0.13" src="#btnWeb" material="transparent: true; shader: flat;">
      </a-plane>

      <a-plane class="clickable" url-opener="link: https://www.youtube.com/" position="0.55 -0.22 0.02" width="0.48"
        height="0.13" src="#btnIn" material="transparent: true; shader: flat;">
      </a-plane>

      <a-circle class="clickable" url-opener="link: https://www.instagram.com/" position="-0.25 -0.55 0.02" radius="0.08"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTY-0y1vWRxqeWnurh214AIqYiQ08C9GjjTV9OBOg_BDw&s=10"
        material="transparent: true; shader: flat;"></a-circle>
    </a-entity>
  </a-scene>
</body>
</html>
