<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Business Card Layout</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <script>
    AFRAME.registerComponent('url-opener', {
      schema: { link: {type: 'string'} },
      init: function () {
        this.el.addEventListener('click', () => window.open(this.data.link, '_blank'));
      }
    });
  </script>
</head>

<body>    
  <a-scene 
    mindar-image="imageTargetSrc: ./tracker1.mind;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="iconMail" src="assets/mail-icon.png">
      <img id="iconPhone" src="assets/phone-icon.png">
      <img id="iconWeb" src="assets/web-icon.png">
      <img id="videoMock" src="assets/portfolio-preview.jpg">
      <a-asset-item id="model1" src="assets/model1.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse;" raycaster="objects: .clickable;"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-image class="clickable" src="https://images.icon-icons.com/1826/PNG/512/4202011emailgmaillogomailsocialsocialmedia-115677_115624.png" url-opener="link: https://mail.google.com/mail/u/0/?tab=rm&ogbl" position="-0.7 0.2 0.02" width="0.15" height="0.15"></a-image>
      <a-image class="clickable" src="https://i.pinimg.com/736x/7d/dc/54/7ddc545046b212d9ecc8eef83569222b.jpg" url-opener="link: https://www.youtube.com/" position="-0.7 0 0.02" width="0.15" height="0.15"></a-image>
      <a-image class="clickable" src="https://img.magnific.com/premium-vector/twitter-vector-logo-logotype-vector-social-media_901408-396.jpg?semt=ais_hybrid&w=740&q=80" url-opener="link: https://x.com/" position="-0.7 -0.2 0.02" width="0.15" height="0.15"></a-image>

      <a-entity gltf-model="#model1" position="0 0.6 0" scale="0.5 0.5 0.5"></a-entity>

      <a-plane class="clickable" url-opener="link: https://your-portfolio.com" src="#videoMock" position="0 -0.8 0.01" width="1.2" height="0.6"></a-plane>




    </a-entity>
  </a-scene>
</body>
</html>
