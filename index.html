<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Business Card</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <script>
    // Robust component to handle clicks and bypass pop-up blockers
    AFRAME.registerComponent('url-opener', {
      schema: { link: {type: 'string'} },
      init: function () {
        this.el.addEventListener('click', () => {
          const targetUrl = this.data.link;
          const newWindow = window.open(targetUrl, '_blank');
          // If the browser blocks the popup, navigate the current page instead
          if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
            window.location.href = targetUrl;
          }
        });
      }
    });
  </script>
</head>

<body>
  <a-scene 
    mindar-image="imageTargetSrc: ./tracker1.mind; uiLoading:yes; uiScanning:yes;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="videoMock" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&w=400&h=250&q=80">
      <a-asset-item id="model1" src="./assets/model1.glb"></a-asset-item>
    </a-assets>

    <a-camera 
      position="0 0 0" 
      look-controls="enabled: false" 
      cursor="rayOrigin: mouse; fuse: false;" 
      raycaster="objects: .clickable;">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-image class="clickable" src="https://cdn-icons-png.flaticon.com/512/732/732200.png" url-opener="link: https://mail.google.com/" position="-0.7 0.2 0.02" width="0.15" height="0.15"></a-image>
      <a-image class="clickable" src="https://cdn-icons-png.flaticon.com/512/3670/3670151.png" url-opener="link: https://youtube.com/" position="-0.7 0 0.02" width="0.15" height="0.15"></a-image>
      <a-image class="clickable" src="https://cdn-icons-png.flaticon.com/512/733/733579.png" url-opener="link: https://x.com/" position="-0.7 -0.2 0.02" width="0.15" height="0.15"></a-image>

      <a-entity gltf-model="#model1" position="0 0.6 0" scale="0.5 0.5 0.5"></a-entity>

      <a-plane class="clickable" url-opener="link: https://your-portfolio.com" src="#videoMock" position="0 -0.8 0.01" width="1.2" height="0.6"></a-plane>

    </a-entity>
  </a-scene>
</body>
</html>
